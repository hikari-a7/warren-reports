<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warren — 次の一手</title>
<style>
  :root {
    --bg:       #07090d;
    --surf1:    #0d1018;
    --surf2:    #111620;
    --surf3:    #161d2a;
    --border:   #1c2535;
    --border2:  #243044;
    --text1:    #dce4f0;
    --text2:    #8a9ab8;
    --text3:    #4e5f78;
    --up:       #4a9e7a;   /* セージグリーン */
    --up-dim:   #4a9e7a22;
    --up-mid:   #4a9e7a44;
    --dn:       #a85858;   /* ダストローズ */
    --dn-dim:   #a8585820;
    --dn-mid:   #a8585840;
    --hot:      #c49040;   /* ウォームアンバー */
    --hot-dim:  #c4904022;
    --hot-mid:  #c4904044;
    --cool:     #4a7eb8;   /* スチールブルー */
    --cool-dim: #4a7eb820;
    --slate:    #3a4d66;
    --slate-dim:#3a4d6622;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text1);
    min-height: 100vh;
  }

  .header {
    background: var(--surf1);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-title { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
  .header-title span { color: var(--up); }
  .header-sub { font-size: 13px; color: var(--text3); margin-top: 3px; }
  .nav { display: flex; gap: 8px; }
  .nav a {
    font-size: 14px; color: var(--text2); text-decoration: none;
    padding: 6px 16px; border-radius: 7px; border: 1px solid var(--border);
    transition: all .15s;
  }
  .nav a:hover { color: var(--text1); border-color: var(--border2); }
  .nav a.active { color: var(--up); border-color: var(--up-mid); background: var(--up-dim); }

  .container { max-width: 1440px; margin: 0 auto; padding: 24px 32px 56px; }

  /* テーマレーダー */
  .radar-section { margin-bottom: 28px; }
  .section-head {
    font-size: 13px; font-weight: 700; color: var(--text3);
    text-transform: uppercase; letter-spacing: 1.2px;
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px;
  }
  .section-head::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .radar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
  .radar-card {
    background: var(--surf2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
    transition: border-color .2s;
  }
  .radar-card:hover { border-color: var(--border2); }
  .radar-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 14px 14px 0 0;
  }
  .radar-card.hot::before     { background: var(--hot); }
  .radar-card.rising::before  { background: var(--up); }
  .radar-card.neutral::before { background: var(--slate); }
  .radar-card.cooling::before { background: var(--cool); }
  .radar-card.cold::before    { background: var(--dn); }

  .radar-icon { font-size: 22px; margin-bottom: 8px; }
  .radar-name { font-size: 13px; font-weight: 700; color: var(--text2); margin-bottom: 8px; line-height: 1.3; }
  .radar-week { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .radar-week.pos  { color: var(--up); }
  .radar-week.neg  { color: var(--dn); }
  .radar-week.zero { color: var(--text3); }
  .radar-day { font-size: 12px; color: var(--text3); margin-top: 3px; }
  .radar-badge {
    display: inline-block;
    font-size: 11px; font-weight: 700;
    padding: 3px 9px; border-radius: 5px;
    margin-top: 8px;
  }
  .radar-badge.hot     { background: var(--hot-dim);  color: var(--hot);  border: 1px solid var(--hot-mid); }
  .radar-badge.rising  { background: var(--up-dim);   color: var(--up);   border: 1px solid var(--up-mid); }
  .radar-badge.neutral { background: var(--slate-dim);color: var(--text2);border: 1px solid var(--slate); }
  .radar-badge.cooling { background: var(--cool-dim); color: var(--cool); border: 1px solid #4a7eb840; }
  .radar-badge.cold    { background: var(--dn-dim);   color: var(--dn);   border: 1px solid var(--dn-mid); }

  /* ステータスサマリー */
  .status-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .status-pill {
    display: flex; align-items: center; gap: 6px;
    border-radius: 20px; padding: 6px 16px;
    font-size: 14px; font-weight: 700; border: 1px solid;
  }
  .status-pill.ready { background: var(--up-dim);   border-color: var(--up-mid);  color: var(--up); }
  .status-pill.near  { background: var(--hot-dim);  border-color: var(--hot-mid); color: var(--hot); }
  .status-pill.watch { background: var(--slate-dim);border-color: var(--slate);   color: var(--text2); }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot.ready { background: var(--up); }
  .dot.near  { background: var(--hot); animation: blink 1.4s ease-in-out infinite; }
  .dot.watch { background: var(--text3); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* 候補カード */
  .cand-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(520px, 1fr)); gap: 16px; }
  .cand-card {
    background: var(--surf2);
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    position: relative;
    transition: border-color .2s;
  }
  .cand-card:hover { border-color: var(--border2); }
  .cand-accent {
    position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
  }
  .cand-accent.ready { background: var(--up); }
  .cand-accent.near  { background: var(--hot); animation: glow-h 1.8s ease-in-out infinite; }
  .cand-accent.watch { background: var(--slate); }
  @keyframes glow-h { 0%,100%{opacity:1} 50%{opacity:.5} }

  .cand-inner { padding: 22px 22px 22px 26px; }

  /* カードヘッダー */
  .cand-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .cand-name { font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 4px; letter-spacing: -0.3px; }
  .cand-meta { font-size: 13px; color: var(--text3); }
  .cand-price-block { text-align: right; }
  .cand-price { font-size: 26px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
  .cand-chg { font-size: 14px; font-weight: 700; margin-top: 3px; }
  .cand-chg.pos { color: var(--up); }
  .cand-chg.neg { color: var(--dn); }

  /* ステータスバッジ */
  .cand-badge {
    display: inline-block;
    font-size: 13px; font-weight: 800;
    padding: 5px 13px; border-radius: 8px; border: 1px solid;
    margin-bottom: 8px;
  }
  .cand-badge.ready { background: var(--up-dim);   border-color: var(--up-mid);  color: var(--up); }
  .cand-badge.near  { background: var(--hot-dim);  border-color: var(--hot-mid); color: var(--hot); }
  .cand-badge.watch { background: var(--slate-dim);border-color: var(--slate);   color: var(--text2); }

  /* 投資メモ */
  .memo-box {
    background: var(--surf1);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 14px;
  }
  .memo-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .memo-reason { font-size: 15px; color: var(--text1); line-height: 1.7; margin-bottom: 10px; }
  .memo-catalyst { font-size: 14px; color: var(--hot); margin-bottom: 8px; }
  .memo-risk { font-size: 13px; color: var(--dn); }
  .memo-period { font-size: 13px; color: var(--text3); margin-top: 8px; }

  /* エントリーバー */
  .entry-wrap { margin-bottom: 14px; }
  .entry-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--text3); margin-bottom: 6px; }
  .entry-bar { position: relative; height: 28px; background: var(--surf1); border-radius: 8px; border: 1px solid var(--border); }
  .entry-fill { position: absolute; top: 0; bottom: 0; background: var(--up-dim); border: 1px solid var(--up-mid); border-radius: 7px; }
  .entry-marker { position: absolute; top: -5px; bottom: -5px; width: 3px; border-radius: 2px; transform: translateX(-50%); }
  .entry-marker.inside  { background: var(--up); }
  .entry-marker.outside { background: var(--dn); }
  .entry-marker.near-z  { background: var(--hot); }
  .marker-tip { position: absolute; top: -22px; transform: translateX(-50%); font-size: 11px; font-weight: 800; white-space: nowrap; }
  .entry-sub { display: flex; justify-content: space-between; margin-top: 5px; font-size: 12px; color: var(--text3); }

  /* 数字ブロック */
  .nums { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .num-box { background: var(--surf1); border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; }
  .num-label { font-size: 12px; color: var(--text3); margin-bottom: 4px; font-weight: 600; }
  .num-val { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; }
  .num-val.g { color: var(--up); }
  .num-val.r { color: var(--dn); }
  .num-val.w { color: var(--text1); }
  .num-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }

  /* RR */
  .rr-box { background: var(--surf1); border: 1px solid var(--border); border-radius: 10px; padding: 11px 16px; }
  .rr-label { font-size: 12px; color: var(--text3); margin-bottom: 8px; font-weight: 600; }
  .rr-bar { display: flex; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 6px; }
  .rr-g { background: var(--up); border-radius: 4px 0 0 4px; }
  .rr-r { background: var(--dn); border-radius: 0 4px 4px 0; }
  .rr-nums { display: flex; justify-content: space-between; font-size: 12px; }

  /* テクニカルチップ */
  .chips { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 10px; }
  .chip { font-size: 12px; font-weight: 600; padding: 4px 11px; border-radius: 6px; border: 1px solid; }
  .chip.rsi-ok  { background: var(--up-dim);   border-color: var(--up-mid);  color: var(--up); }
  .chip.rsi-hot { background: var(--dn-dim);   border-color: var(--dn-mid);  color: var(--dn); }
  .chip.rsi-low { background: var(--cool-dim); border-color: #4a7eb840;      color: var(--cool); }
  .chip.vol     { background: var(--hot-dim);  border-color: var(--hot-mid); color: var(--hot); }
  .chip.neutral { background: var(--slate-dim);border-color: var(--slate);   color: var(--text2); }

  /* 空・ローディング */
  .empty { text-align: center; padding: 80px 20px; color: var(--text3); }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-title { font-size: 18px; font-weight: 700; color: var(--text2); margin-bottom: 10px; }
  .empty-desc { font-size: 15px; line-height: 1.8; }
  .loading { display: flex; flex-direction: column; align-items: center; padding: 100px 20px; gap: 16px; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--up); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 15px; color: var(--text3); }

  .updated { font-size: 13px; color: var(--text3); text-align: right; margin-bottom: 16px; }
  .footer { font-size: 12px; color: var(--text3); text-align: center; padding: 20px 0 0; line-height: 1.9; border-top: 1px solid var(--border); margin-top: 8px; }

  /* サイドバー */
  .layout { display: flex; min-height: 100vh; }
  .sidebar {
    width: 220px; flex-shrink: 0;
    background: var(--surf1);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    position: fixed; top: 0; left: 0; bottom: 0;
    z-index: 100;
  }
  .sidebar-brand {
    padding: 22px 20px 18px;
    font-size: 20px; font-weight: 800; color: #fff;
    border-bottom: 1px solid var(--border);
    letter-spacing: -0.5px;
  }
  .sidebar-brand span { color: var(--up); }
  .sidebar-nav { padding: 14px 10px; flex: 1; display: flex; flex-direction: column; gap: 3px; }
  .nav-item {
    display: flex; align-items: center; gap: 11px;
    padding: 10px 12px; border-radius: 9px;
    color: var(--text2); text-decoration: none;
    font-size: 14px; font-weight: 600;
    transition: all .15s;
  }
  .nav-item:hover { background: var(--surf3); color: var(--text1); }
  .nav-item.active { background: var(--surf3); color: var(--up); }
  .nav-icon { font-size: 17px; width: 22px; text-align: center; }
  .sidebar-footer {
    padding: 14px 20px;
    font-size: 11px; color: var(--text3);
    border-top: 1px solid var(--border);
  }
  .main-wrap { flex: 1; margin-left: 220px; min-width: 0; }

  /* モバイル対応 */
  .mobile-nav { display: none; }
  @media (max-width: 767px) {
    .sidebar { display: none; }
    .main-wrap { margin-left: 0; }
    .header { padding: 12px 16px; }
    .header-title { font-size: 18px; }
    .header-sub { display: none; }
    .container { padding: 16px 12px 80px; }
    .radar-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .cand-grid { grid-template-columns: 1fr !important; }
    .nums { grid-template-columns: 1fr 1fr !important; }
    .status-row { gap: 6px; }
    .cand-name { font-size: 18px; }
    .cand-price { font-size: 22px; }
    .mobile-nav {
      display: flex; position: fixed; bottom: 0; left: 0; right: 0;
      height: 60px; background: var(--surf1); border-top: 1px solid var(--border); z-index: 200;
    }
    .mobile-nav a {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2px; text-decoration: none;
      color: var(--text3); font-size: 10px; font-weight: 600;
    }
    .mobile-nav a.active { color: var(--up); }
    .mobile-nav .mnav-icon { font-size: 20px; line-height: 1; }
  }
</style>
</head>
<body>
<div class="layout">

<div class="sidebar">
  <div class="sidebar-brand">⚡ <span>Warren</span></div>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="nav-item">
      <span class="nav-icon">📊</span>ポジション
    </a>
    <a href="watchlist.html" class="nav-item active">
      <span class="nav-icon">🎯</span>次の一手
    </a>
    <a href="ranking.html" class="nav-item">
      <span class="nav-icon">📈</span>全銘柄ランキング
    </a>
    <a href="portfolio.html" class="nav-item">
      <span class="nav-icon">💼</span>推奨ポートフォリオ
    </a>
  </nav>
  <div class="sidebar-footer">Powered by Claude</div>
</div>

<div class="main-wrap">
<div class="header">
  <div>
    <div class="header-title">🎯 次の一手</div>
    <div class="header-sub">スクリーニング × 投資メモ × テーマレーダー</div>
  </div>
</div>

<div class="container">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Warren が分析中...</div>
  </div>
  <div id="content" style="display:none"></div>
</div>
</div><!-- /main-wrap -->
</div><!-- /layout -->

<script>
const fmt = n => Math.abs(Math.round(n)).toLocaleString('ja-JP');
const fmtF = n => n.toLocaleString('ja-JP');

const momentumLabel = { hot:'🔥 急騰中', rising:'↑ 上昇中', neutral:'→ 横ばい', cooling:'↓ 鈍化中', cold:'❄️ 下落中' };

function buildRadar(themes) {
  if (!themes || themes.length === 0) return '';
  const cards = themes.map(t => {
    const isPos = t.avg_week >= 0;
    const wLabel = (isPos ? '+' : '') + t.avg_week.toFixed(1) + '%';
    const dLabel = (t.avg_day >= 0 ? '+' : '') + t.avg_day.toFixed(1) + '%';
    return `
<div class="radar-card ${t.momentum}">
  <div class="radar-icon">${t.icon}</div>
  <div class="radar-name">${t.name}</div>
  <div class="radar-week ${isPos ? 'pos' : t.avg_week < 0 ? 'neg' : 'zero'}">${wLabel}</div>
  <div class="radar-day">本日 ${dLabel} ・ ${t.stock_count}銘柄</div>
  <span class="radar-badge ${t.momentum}">${momentumLabel[t.momentum] || t.momentum}</span>
</div>`;
  }).join('');
  return `
<div class="radar-section">
  <div class="section-head">テーマレーダー — 週間騰落</div>
  <div class="radar-grid">${cards}</div>
</div>`;
}

function statusLabel(s) {
  if (s === 'ready') return '🟢 今すぐ買える';
  if (s === 'near')  return '🟡 エントリーゾーン接近中';
  return '⏳ 下落待ち';
}

function buildEntryBar(c) {
  const lo  = c.entry_low;
  const hi  = c.entry_high;
  const cur = c.price;
  if (!lo || !hi) return '';

  const barMin   = lo * 0.88;
  const barMax   = hi * 1.22;
  const barRange = barMax - barMin;
  const zL = ((lo - barMin) / barRange * 100).toFixed(1);
  const zW = ((hi - lo)    / barRange * 100).toFixed(1);

  let mPct = Math.min(Math.max((cur - barMin) / barRange * 100, 2), 97);
  const isIn   = cur >= lo && cur <= hi;
  const isNear = !isIn && cur <= hi * 1.06;
  const mClass = isIn ? 'inside' : (isNear ? 'near-z' : 'outside');
  const mColor = isIn ? '#4ade80' : (isNear ? '#fbbf24' : '#f87171');

  const distMsg = isIn
    ? 'エントリーゾーン内'
    : cur < lo
      ? `あと -${((lo - cur) / cur * 100).toFixed(1)}% でゾーン入り`
      : `ゾーンより +${((cur - hi) / hi * 100).toFixed(1)}% 上`;

  return `
<div class="entry-wrap">
  <div class="entry-row"><span>エントリーゾーン</span><span style="color:${mColor}">${distMsg}</span></div>
  <div class="entry-bar">
    <div class="entry-fill" style="left:${zL}%;width:${zW}%"></div>
    <div class="entry-marker ${mClass}" style="left:${mPct.toFixed(1)}%">
      <div class="marker-tip" style="color:${mColor}">¥${fmt(cur)}</div>
    </div>
  </div>
  <div class="entry-sub"><span>¥${fmt(lo)}</span><span style="color:#4ade8066">ゾーン ¥${fmt(lo)}〜¥${fmt(hi)}</span><span>¥${fmt(hi)}</span></div>
</div>`;
}

function buildChips(c) {
  const chips = [];
  const rsi = c.rsi;
  if (rsi !== undefined) {
    if (rsi < 30)      chips.push(`<span class="chip rsi-low">RSI ${rsi} 売られすぎ</span>`);
    else if (rsi < 55) chips.push(`<span class="chip rsi-ok">RSI ${rsi} 良好</span>`);
    else               chips.push(`<span class="chip rsi-hot">RSI ${rsi} 高値圏</span>`);
  }
  if (c.vol_ratio >= 2) chips.push(`<span class="chip vol">出来高 ${c.vol_ratio}x</span>`);
  if (c.vs_ma25 !== undefined && c.vs_ma25 !== null) {
    const label = c.vs_ma25 >= 0 ? `MA25比 +${c.vs_ma25}%` : `MA25比 ${c.vs_ma25}%`;
    chips.push(`<span class="chip ${c.vs_ma25 >= 0 ? 'rsi-ok' : 'neutral'}">${label}</span>`);
  }
  if (c.week_pct !== undefined) chips.push(`<span class="chip ${c.week_pct >= 0 ? 'rsi-ok' : 'neutral'}">週間 ${c.week_pct >= 0 ? '+' : ''}${c.week_pct}%</span>`);
  return chips.length ? `<div class="chips">${chips.join('')}</div>` : '';
}

function buildCard(c) {
  const s = c.status || 'watch';
  const rrGain  = c.target_pct ? Math.abs(c.target_pct) : 20;
  const rrLoss  = c.stop_pct   ? Math.abs(c.stop_pct)   : 8;
  const rrTotal = rrGain + rrLoss;
  const rrRatio = (rrGain / rrLoss).toFixed(1);
  const gPct    = (rrGain / rrTotal * 100).toFixed(0);
  const isPos   = c.change_pct >= 0;

  return `
<div class="cand-card">
  <div class="cand-accent ${s}"></div>
  <div class="cand-inner">

    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
      <div class="cand-badge ${s}">${statusLabel(s)}</div>
      ${c.theme_name ? `<span style="font-size:11px;color:#6b7280">${c.theme_name}</span>` : ''}
    </div>

    <div class="cand-top">
      <div>
        <div class="cand-name">${c.name}</div>
        <div class="cand-meta">${c.code} ・ Warren推奨 ${c.added_date || ''}</div>
      </div>
      <div class="cand-price-block">
        <div class="cand-price">¥${fmtF(c.price)}</div>
        <div class="cand-chg ${isPos ? 'pos' : 'neg'}">${isPos ? '+' : ''}${c.change_pct}%</div>
      </div>
    </div>

    <div class="memo-box">
      <div class="memo-label">⚡ Warren の見立て</div>
      <div class="memo-reason">${c.reason || '—'}</div>
      ${c.catalyst ? `<div class="memo-catalyst">🎯 ${c.catalyst}</div>` : ''}
      ${c.risk     ? `<div class="memo-risk">⚠️ ${c.risk}</div>`        : ''}
      ${c.hold_period ? `<div class="memo-period">⏱ 想定保有期間: ${c.hold_period}</div>` : ''}
    </div>

    ${buildEntryBar(c)}
    ${buildChips(c)}

    <div class="nums" style="margin-top:10px">
      <div class="num-box">
        <div class="num-label">↑ 目標 +${c.target_pct || '—'}%</div>
        <div class="num-val g">¥${c.target_price ? fmt(c.target_price) : '—'}</div>
      </div>
      <div class="num-box">
        <div class="num-label">↓ 損切 ${c.stop_pct || '—'}%</div>
        <div class="num-val r">¥${c.stop_price ? fmt(c.stop_price) : '—'}</div>
      </div>
      <div class="num-box">
        <div class="num-label">スコア</div>
        <div class="num-val w">${c.score || '—'}<span style="font-size:11px;color:#6b7280">点</span></div>
        <div class="num-sub">全銘柄中</div>
      </div>
    </div>

    <div class="rr-box">
      <div class="rr-label">リスク・リワード比 (RR = ${rrRatio})</div>
      <div class="rr-bar">
        <div class="rr-g" style="width:${gPct}%"></div>
        <div class="rr-r" style="width:${100-gPct}%"></div>
      </div>
      <div class="rr-nums">
        <span style="color:#4ade80">利益目標 +${rrGain}%</span>
        <span style="color:#f87171">損切ライン ${c.stop_pct || -8}%</span>
      </div>
    </div>

  </div>
</div>`;
}

function buildStatusRow(candidates) {
  const ready = candidates.filter(c => c.status === 'ready').length;
  const near  = candidates.filter(c => c.status === 'near').length;
  const watch = candidates.filter(c => c.status === 'watch').length;
  let html = '';
  if (ready) html += `<div class="status-pill ready"><div class="dot ready"></div>今すぐ買える ${ready}件</div>`;
  if (near)  html += `<div class="status-pill near"><div class="dot near"></div>接近中 ${near}件</div>`;
  if (watch) html += `<div class="status-pill watch"><div class="dot watch"></div>待機中 ${watch}件</div>`;
  return `<div class="status-row">${html}</div>`;
}

async function loadRadar() {
  try {
    const r = await fetch('theme_radar.json?t=' + Date.now());
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

async function load() {
  try {
    const [wlRes, radarData] = await Promise.all([
      fetch('watchlist.json?t=' + Date.now()),
      loadRadar(),
    ]);
    if (!wlRes.ok) throw new Error('HTTP ' + wlRes.status);
    const wl = await wlRes.json();
    const candidates = wl.candidates || [];

    let html = '';

    if (radarData && radarData.themes && radarData.themes.length > 0) {
      html += buildRadar(radarData.themes);
    }

    html += `<div class="updated">Warren更新: ${wl.updated || '—'}</div>`;

    if (candidates.length === 0) {
      html += `
<div class="empty">
  <div class="empty-icon">📭</div>
  <div class="empty-title">候補なし</div>
  <div class="empty-desc">毎朝8:30のスクリーナーで自動更新されます。<br>手動実行はGitHub Actions → Warren Screener → Run workflow。</div>
</div>`;
    } else {
      html += `<div class="section-head" style="margin-bottom:14px">買い候補 ${candidates.length}件</div>`;
      html += buildStatusRow(candidates);
      html += `<div class="cand-grid">${candidates.map(buildCard).join('')}</div>`;
    }

    html += `<div class="footer">⚡ Warren — Powered by Claude<br>本情報は投資助言ではありません。売買は自己責任で行ってください。</div>`;

    document.getElementById('content').innerHTML = html;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">読み込みエラー</div><div class="empty-desc">${e.message}</div></div>`;
    document.getElementById('content').style.display = 'block';
  }
}

load();
setInterval(load, 5 * 60 * 1000);
</script>
