name: Warren Daily Report

on:
  schedule:
    - cron: '0 23 * * 0-4'   # 朝8:00 JST（UTC前日23:00）
    - cron: '15 3 * * 1-5'   # 前場引け12:15 JST（UTC 3:15）
    - cron: '0 9 * * 1-5'    # 引け後18:00 JST（UTC 9:00）
    - cron: '0 9 * * 5'      # 週次レポート 金曜18:00 JST（UTC 9:00）※引け後と兼用
  workflow_dispatch:
    inputs:
      report_type:
        description: 'レポートタイプ (morning / midday / evening / weekly)'
        required: false
        default: 'morning'

permissions:
  contents: write

jobs:
  daily-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic yfinance matplotlib mplfinance

      - name: Determine report type
        id: report_type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.report_type }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            DOW=$(date -u +%u)   # 1=月 ... 5=金
            if [ "$HOUR" = "23" ]; then
              echo "type=morning" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "03" ]; then
              echo "type=midday" >> $GITHUB_OUTPUT
            elif [ "$DOW" = "5" ]; then
              echo "type=weekly" >> $GITHUB_OUTPUT
            else
              echo "type=evening" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Generate and send report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          REPORT_TYPE: ${{ steps.report_type.outputs.type }}
        run: python warren_daily.py

      - name: Commit report
        run: |
          git config user.name "Warren"
          git config user.email "warren@claude.local"
          git add -A
          git diff --staged --quiet || git commit -m "report: $(date +%Y-%m-%d-%H%M)"
          git push

      - name: Notify failure via LINE
        if: failure()
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request
          token = os.environ["LINE_CHANNEL_ACCESS_TOKEN"]
          user_id = os.environ["LINE_USER_ID"]
          msg = "⚠️ Warren レポート送信に失敗しました\n\nhttps://github.com/hikari-a7/warren-reports/actions"
          payload = json.dumps({"to": user_id, "messages": [{"type": "text", "text": msg}]}).encode()
          req = urllib.request.Request(
              "https://api.line.me/v2/bot/message/push",
              data=payload,
              headers={"Content-Type": "application/json", "Authorization": f"Bearer {token}"},
              method="POST"
          )
          urllib.request.urlopen(req)
          EOF
