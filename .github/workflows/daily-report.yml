name: Warren Daily Report

on:
  schedule:
    - cron: '0 23 * * 0-4'  # 平日8時JST（UTC 23:00 前日）
  workflow_dispatch:          # 手動実行ボタン

permissions:
  contents: write

jobs:
  daily-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate and send report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python warren_daily.py

      - name: Commit report
        run: |
          git config user.name "Warren"
          git config user.email "warren@claude.local"
          git add -A
          git diff --staged --quiet || git commit -m "report: $(date +%Y-%m-%d)"
          git push
