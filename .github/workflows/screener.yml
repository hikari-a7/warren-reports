name: Warren Screener

on:
  schedule:
    - cron: '30 23 * * 0-4'   # 毎朝8:30 JST (UTC 前日23:30)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screener:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic yfinance xlrd

      - name: Run screener
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python warren_screener.py

      - name: Commit results
        run: |
          git config user.name "Warren"
          git config user.email "warren@claude.local"
          git add watchlist.json theme_radar.json ranking.json
          git diff --staged --quiet || git commit -m "screener: $(date +%Y-%m-%d)"
          git push

      - name: Notify failure
        if: failure()
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request
          token = os.environ["LINE_CHANNEL_ACCESS_TOKEN"]
          uid   = os.environ["LINE_USER_ID"]
          msg   = "⚠️ Warren スクリーナー失敗\nhttps://github.com/hikari-a7/warren-reports/actions"
          payload = json.dumps({"to": uid, "messages": [{"type": "text", "text": msg}]}).encode()
          req = urllib.request.Request(
              "https://api.line.me/v2/bot/message/push", data=payload,
              headers={"Content-Type": "application/json", "Authorization": f"Bearer {token}"},
              method="POST")
          urllib.request.urlopen(req)
          EOF
