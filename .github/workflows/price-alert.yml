name: Warren Price Alert

on:
  schedule:
    - cron: '*/15 0-6 * * 1-5'  # 取引時間中（JST 9:00〜16:00）15分ごと
  workflow_dispatch:

permissions:
  contents: write

jobs:
  price-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance

      - name: Run price alert check
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python warren_alert.py

      - name: Commit alert log
        run: |
          git config user.name "Warren"
          git config user.email "warren@claude.local"
          git add alert_log.json
          git diff --staged --quiet && echo "変更なし" || (git commit -m "alert-log: $(date +%Y-%m-%d-%H%M)" && git pull --rebase && git push)
