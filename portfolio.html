<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warren — 推奨ポートフォリオ</title>
<style>
  :root {
    --bg:       #07090d;
    --surf1:    #0d1018;
    --surf2:    #111620;
    --surf3:    #161d2a;
    --border:   #1c2535;
    --border2:  #243044;
    --text1:    #dce4f0;
    --text2:    #8a9ab8;
    --text3:    #4e5f78;
    --up:       #4a9e7a;
    --up-dim:   #4a9e7a22;
    --up-mid:   #4a9e7a44;
    --dn:       #a85858;
    --dn-dim:   #a8585820;
    --dn-mid:   #a8585840;
    --hot:      #c49040;
    --hot-dim:  #c4904022;
    --hot-mid:  #c4904044;
    --cool:     #4a7eb8;
    --slate:    #3a4d66;
    --slate-dim:#3a4d6622;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text1);
    min-height: 100vh;
  }

  /* サイドバー */
  .layout { display: flex; min-height: 100vh; }
  .sidebar {
    width: 220px; flex-shrink: 0;
    background: var(--surf1);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    position: fixed; top: 0; left: 0; bottom: 0;
    z-index: 100;
  }
  .sidebar-brand {
    padding: 22px 20px 18px;
    font-size: 20px; font-weight: 800; color: #fff;
    border-bottom: 1px solid var(--border);
    letter-spacing: -0.5px;
  }
  .sidebar-brand span { color: var(--up); }
  .sidebar-nav { padding: 14px 10px; flex: 1; display: flex; flex-direction: column; gap: 3px; }
  .nav-item {
    display: flex; align-items: center; gap: 11px;
    padding: 10px 12px; border-radius: 9px;
    color: var(--text2); text-decoration: none;
    font-size: 14px; font-weight: 600;
    transition: all .15s;
  }
  .nav-item:hover { background: var(--surf3); color: var(--text1); }
  .nav-item.active { background: var(--surf3); color: var(--up); }
  .nav-icon { font-size: 17px; width: 22px; text-align: center; }
  .sidebar-footer {
    padding: 14px 20px;
    font-size: 11px; color: var(--text3);
    border-top: 1px solid var(--border);
  }
  .main-wrap { flex: 1; margin-left: 220px; min-width: 0; }

  /* ヘッダー */
  .header {
    background: var(--surf1);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 10;
  }
  .header-title { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
  .header-sub { font-size: 13px; color: var(--text3); margin-top: 3px; }

  /* 資本入力 */
  .capital-bar {
    background: var(--surf2);
    border-bottom: 1px solid var(--border);
    padding: 14px 32px;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .capital-label { font-size: 14px; color: var(--text2); font-weight: 600; }
  .capital-input-wrap { display: flex; align-items: center; gap: 8px; }
  .capital-input {
    background: var(--surf3); border: 1px solid var(--border2);
    border-radius: 8px; color: var(--text1);
    font-size: 18px; font-weight: 700; font-family: inherit;
    padding: 6px 14px; width: 160px; outline: none;
    transition: border-color .15s;
  }
  .capital-input:focus { border-color: var(--up); }
  .capital-unit { font-size: 14px; color: var(--text2); }
  .capital-presets { display: flex; gap: 6px; }
  .preset-btn {
    background: var(--surf3); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text2);
    font-size: 13px; font-weight: 600; padding: 5px 12px;
    cursor: pointer; transition: all .15s; font-family: inherit;
  }
  .preset-btn:hover { border-color: var(--border2); color: var(--text1); }

  .container { max-width: 1440px; margin: 0 auto; padding: 24px 32px 56px; }

  .section-head {
    font-size: 13px; font-weight: 700; color: var(--text3);
    text-transform: uppercase; letter-spacing: 1.2px;
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px;
  }
  .section-head::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* サマリーカード */
  .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
  .summary-card {
    background: var(--surf2); border: 1px solid var(--border);
    border-radius: 14px; padding: 18px 20px;
  }
  .summary-label { font-size: 12px; color: var(--text3); font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  .summary-val { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
  .summary-val.neutral { color: var(--text1); }
  .summary-val.up { color: var(--up); }
  .summary-val.dn { color: var(--dn); }
  .summary-val.hot { color: var(--hot); }
  .summary-sub { font-size: 13px; color: var(--text3); margin-top: 5px; }

  /* ポジションテーブル */
  .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(480px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .pf-card {
    background: var(--surf2); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden; position: relative;
    transition: border-color .2s;
  }
  .pf-card:hover { border-color: var(--border2); }
  .pf-accent {
    position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    background: var(--up);
  }
  .pf-inner { padding: 20px 20px 20px 24px; }

  .pf-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .pf-name { font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 3px; }
  .pf-meta { font-size: 13px; color: var(--text3); }
  .pf-alloc { text-align: right; }
  .pf-alloc-val { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
  .pf-alloc-pct { font-size: 13px; color: var(--text3); margin-top: 2px; }

  .pf-nums { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
  .pf-num { background: var(--surf1); border: 1px solid var(--border); border-radius: 9px; padding: 10px 12px; }
  .pf-num-label { font-size: 11px; color: var(--text3); margin-bottom: 3px; font-weight: 600; }
  .pf-num-val { font-size: 16px; font-weight: 800; }
  .pf-num-val.up  { color: var(--up); }
  .pf-num-val.dn  { color: var(--dn); }
  .pf-num-val.hot { color: var(--hot); }
  .pf-num-val.neutral { color: var(--text1); }
  .pf-num-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* RRバー */
  .pf-rr { background: var(--surf1); border: 1px solid var(--border); border-radius: 9px; padding: 10px 14px; }
  .pf-rr-label { font-size: 12px; color: var(--text3); margin-bottom: 7px; font-weight: 600; }
  .rr-bar { display: flex; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 6px; }
  .rr-g { background: var(--up); }
  .rr-r { background: var(--dn); }
  .rr-nums { display: flex; justify-content: space-between; font-size: 12px; }

  /* タイムライン */
  .timeline-section { margin-bottom: 28px; }
  .timeline { display: flex; gap: 0; position: relative; }
  .timeline::before {
    content: ''; position: absolute;
    top: 24px; left: 24px; right: 24px; height: 2px;
    background: var(--border);
  }
  .tl-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 10px; position: relative; }
  .tl-dot {
    width: 48px; height: 48px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; border: 2px solid var(--border);
    background: var(--surf2); z-index: 1; position: relative;
  }
  .tl-dot.active { border-color: var(--up); background: var(--up-dim); }
  .tl-label { font-size: 12px; color: var(--text3); font-weight: 600; text-align: center; }
  .tl-val { font-size: 15px; font-weight: 800; color: var(--up); text-align: center; }

  /* ローディング/エラー */
  .loading { display: flex; flex-direction: column; align-items: center; padding: 100px 20px; gap: 16px; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--up); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 15px; color: var(--text3); }
  .empty { text-align: center; padding: 80px 20px; color: var(--text3); font-size: 15px; }

  .footer { font-size: 12px; color: var(--text3); text-align: center; padding: 20px 0 0; line-height: 1.9; border-top: 1px solid var(--border); }
</style>
</head>
<body>
<div class="layout">

<div class="sidebar">
  <div class="sidebar-brand">⚡ <span>Warren</span></div>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="nav-item">
      <span class="nav-icon">📊</span>ポジション
    </a>
    <a href="watchlist.html" class="nav-item">
      <span class="nav-icon">🎯</span>次の一手
    </a>
    <a href="portfolio.html" class="nav-item active">
      <span class="nav-icon">💼</span>推奨ポートフォリオ
    </a>
  </nav>
  <div class="sidebar-footer">Powered by Claude</div>
</div>

<div class="main-wrap">
<div class="header">
  <div>
    <div class="header-title">💼 推奨ポートフォリオ</div>
    <div class="header-sub">Warrenが選ぶ、この資本でこう張る</div>
  </div>
</div>

<div class="capital-bar">
  <span class="capital-label">運用資本</span>
  <div class="capital-input-wrap">
    <input type="number" class="capital-input" id="capitalInput" value="10000000" step="500000">
    <span class="capital-unit">円</span>
  </div>
  <div class="capital-presets">
    <button class="preset-btn" onclick="setCapital(3000000)">300万</button>
    <button class="preset-btn" onclick="setCapital(5000000)">500万</button>
    <button class="preset-btn" onclick="setCapital(10000000)">1000万</button>
    <button class="preset-btn" onclick="setCapital(20000000)">2000万</button>
  </div>
</div>

<div class="container">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Warren がポートフォリオを構築中...</div>
  </div>
  <div id="content" style="display:none"></div>
</div>
</div><!-- /main-wrap -->
</div><!-- /layout -->

<script>
const fmt  = n => Math.abs(Math.round(n)).toLocaleString('ja-JP');
const fmtM = n => (Math.abs(n) / 10000).toFixed(1) + '万';

let watchlistData = null;

function setCapital(val) {
  document.getElementById('capitalInput').value = val;
  renderPortfolio();
}

function parseHoldWeeks(hp) {
  if (!hp) return 3;
  const m = hp.match(/(\d+)/);
  return m ? parseInt(m[1]) : 3;
}

function renderPortfolio() {
  if (!watchlistData) return;
  const candidates = (watchlistData.candidates || []).filter(c =>
    c.price && c.target_price && c.stop_price && c.score
  );
  if (candidates.length === 0) {
    document.getElementById('content').innerHTML = `<div class="empty">ウォッチリストに候補がありません。<br>まずWarren Screenerを実行してください。</div>`;
    return;
  }

  const capital = parseInt(document.getElementById('capitalInput').value) || 10000000;

  // スコア加重配分
  const totalScore = candidates.reduce((s, c) => s + c.score, 0);
  const positions = candidates.map(c => {
    const alloc  = Math.floor(capital * (c.score / totalScore));
    const shares = Math.floor(alloc / c.price);
    const cost   = shares * c.price;
    const targetGain = shares * (c.target_price - c.price);
    const stopLoss   = shares * (c.price - c.stop_price);
    const targetPct  = c.target_pct || ((c.target_price - c.price) / c.price * 100);
    const stopPct    = c.stop_pct   || ((c.stop_price   - c.price) / c.price * 100);
    return { ...c, alloc, shares, cost, targetGain, stopLoss, targetPct, stopPct };
  }).filter(p => p.shares > 0);

  // サマリー計算
  const totalCost    = positions.reduce((s, p) => s + p.cost, 0);
  const totalTarget  = positions.reduce((s, p) => s + p.targetGain, 0);
  const totalRisk    = positions.reduce((s, p) => s + p.stopLoss, 0);
  const rrRatio      = totalRisk > 0 ? (totalTarget / totalRisk).toFixed(1) : '—';
  const targetRetPct = totalCost > 0 ? (totalTarget / totalCost * 100).toFixed(1) : 0;
  const cashLeft     = capital - totalCost;

  // サマリー
  let html = `<div class="section-head">ポートフォリオ概要</div>`;
  html += `<div class="summary-grid">
    <div class="summary-card">
      <div class="summary-label">総投資額</div>
      <div class="summary-val neutral">¥${fmtM(totalCost)}</div>
      <div class="summary-sub">キャッシュ残 ¥${fmtM(cashLeft)}</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">目標利益（理想シナリオ）</div>
      <div class="summary-val up">+¥${fmtM(totalTarget)}</div>
      <div class="summary-sub">+${targetRetPct}% リターン</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">最大リスク（全損切）</div>
      <div class="summary-val dn">−¥${fmtM(totalRisk)}</div>
      <div class="summary-sub">−${totalCost > 0 ? (totalRisk / totalCost * 100).toFixed(1) : 0}% ドローダウン</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">リスク・リワード比</div>
      <div class="summary-val hot">${rrRatio} : 1</div>
      <div class="summary-sub">${positions.length}銘柄に分散</div>
    </div>
  </div>`;

  // 個別ポジション
  html += `<div class="section-head" style="margin-top:8px">個別ポジション — スコア加重配分</div>`;
  html += `<div class="portfolio-grid">`;
  positions.forEach(p => {
    const allocPct = (p.cost / totalCost * 100).toFixed(0);
    const rrG = Math.abs(p.targetPct);
    const rrL = Math.abs(p.stopPct);
    const rrT = rrG + rrL;
    const gPct = (rrG / rrT * 100).toFixed(0);
    html += `
<div class="pf-card">
  <div class="pf-accent"></div>
  <div class="pf-inner">
    <div class="pf-top">
      <div>
        <div class="pf-name">${p.name}</div>
        <div class="pf-meta">${p.code} ・ ${p.theme_name || ''} ・ スコア ${p.score}点</div>
      </div>
      <div class="pf-alloc">
        <div class="pf-alloc-val">¥${fmtM(p.cost)}</div>
        <div class="pf-alloc-pct">配分 ${allocPct}%</div>
      </div>
    </div>

    <div class="pf-nums">
      <div class="pf-num">
        <div class="pf-num-label">現在株価</div>
        <div class="pf-num-val neutral">¥${fmt(p.price)}</div>
        <div class="pf-num-sub">${p.shares}株</div>
      </div>
      <div class="pf-num">
        <div class="pf-num-label">目標 +${Math.abs(p.targetPct).toFixed(0)}%</div>
        <div class="pf-num-val up">+¥${fmtM(p.targetGain)}</div>
        <div class="pf-num-sub">¥${fmt(p.target_price)}</div>
      </div>
      <div class="pf-num">
        <div class="pf-num-label">損切 ${p.stopPct.toFixed(0)}%</div>
        <div class="pf-num-val dn">−¥${fmtM(p.stopLoss)}</div>
        <div class="pf-num-sub">¥${fmt(p.stop_price)}</div>
      </div>
      <div class="pf-num">
        <div class="pf-num-label">保有期間</div>
        <div class="pf-num-val hot" style="font-size:13px">${p.hold_period || '2〜4週'}</div>
      </div>
    </div>

    <div class="pf-rr">
      <div class="pf-rr-label">RR = ${(rrG / rrL).toFixed(1)} &nbsp;|&nbsp; ${p.reason ? p.reason.slice(0, 50) + '…' : ''}</div>
      <div class="rr-bar">
        <div class="rr-g" style="width:${gPct}%"></div>
        <div class="rr-r" style="width:${100 - gPct}%"></div>
      </div>
      <div class="rr-nums">
        <span style="color:var(--up)">利益目標 +${rrG.toFixed(0)}%</span>
        <span style="color:var(--dn)">損切 ${p.stopPct.toFixed(0)}%</span>
      </div>
    </div>
  </div>
</div>`;
  });
  html += `</div>`;

  // 免責
  html += `<div class="footer">💼 Warren 推奨ポートフォリオ ・ 更新: ${watchlistData.updated || '—'}<br>本情報は投資助言ではありません。配分はWarrenのスコアに基づく参考値です。売買は自己責任で。<br>⚡ Powered by Claude</div>`;

  document.getElementById('content').innerHTML = html;
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
}

async function load() {
  try {
    const r = await fetch('watchlist.json?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    watchlistData = await r.json();
    renderPortfolio();
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').innerHTML = `<div class="empty">読み込みエラー: ${e.message}</div>`;
    document.getElementById('content').style.display = 'block';
  }
}

document.getElementById('capitalInput').addEventListener('input', () => renderPortfolio());
load();
</script>
</body>
</html>
