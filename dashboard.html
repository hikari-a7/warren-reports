<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warren Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Noto Sans JP', sans-serif;
    background: #0a0a0f;
    color: #e8ecf0;
    min-height: 100vh;
    font-size: 15px;
  }

  /* ヘッダー */
  .header {
    background: #111118;
    border-bottom: 1px solid #1e2028;
    padding: 18px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-title { font-size: 20px; font-weight: 800; color: #fff; letter-spacing: 0.5px; }
  .header-title span { color: #4ade80; }
  .header-meta { font-size: 13px; color: #6b7280; }

  .container { max-width: 720px; margin: 0 auto; padding: 20px 16px 40px; }

  /* 月次カード */
  .monthly-card {
    background: linear-gradient(135deg, #111118 0%, #16161f 100%);
    border: 1px solid #1e2028;
    border-radius: 16px;
    padding: 22px 24px;
    margin-bottom: 20px;
  }
  .monthly-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }
  .monthly-label { font-size: 13px; color: #6b7280; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
  .monthly-pnl { font-size: 34px; font-weight: 800; line-height: 1; }
  .monthly-pnl.pos { color: #4ade80; }
  .monthly-pnl.neg { color: #f87171; }
  .monthly-target-info { text-align: right; }
  .monthly-target-label { font-size: 13px; color: #6b7280; margin-bottom: 4px; }
  .monthly-target-val { font-size: 20px; font-weight: 700; color: #9ca3af; }
  .monthly-pct-badge {
    display: inline-block;
    background: #4ade8022;
    color: #4ade80;
    border: 1px solid #4ade8044;
    border-radius: 6px;
    padding: 2px 10px;
    font-size: 13px;
    font-weight: 700;
    margin-top: 4px;
  }
  .monthly-pct-badge.neg { background: #f8717122; color: #f87171; border-color: #f8717144; }

  .progress-wrap { margin-bottom: 16px; }
  .progress-labels { display: flex; justify-content: space-between; font-size: 12px; color: #6b7280; margin-bottom: 6px; }
  .progress-bar { height: 8px; background: #1e2028; border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 4px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
  .progress-fill.pos { background: linear-gradient(90deg, #16a34a, #4ade80); }
  .progress-fill.neg { background: #dc2626; }

  .monthly-breakdown {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }
  .breakdown-item {
    background: #0a0a0f;
    border-radius: 10px;
    padding: 12px 14px;
    border: 1px solid #1e2028;
  }
  .breakdown-label { font-size: 12px; color: #6b7280; margin-bottom: 5px; }
  .breakdown-val { font-size: 17px; font-weight: 700; }
  .breakdown-val.pos { color: #4ade80; }
  .breakdown-val.neg { color: #f87171; }
  .breakdown-val.neutral { color: #e8ecf0; }

  /* セクション見出し */
  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 24px 0 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: #1e2028; }

  /* ポジションカード */
  .pos-card {
    background: #111118;
    border: 1px solid #1e2028;
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
    position: relative;
  }
  .pos-card-accent {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    border-radius: 14px 0 0 14px;
  }
  .pos-card-accent.profit { background: #4ade80; }
  .pos-card-accent.loss { background: #f87171; }
  .pos-card-accent.alert { background: #fbbf24; box-shadow: 0 0 12px #fbbf2466; }

  .pos-inner { padding: 18px 20px 18px 24px; }

  .pos-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }
  .pos-name { font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 3px; }
  .pos-sub { font-size: 13px; color: #6b7280; }
  .pos-price-block { text-align: right; }
  .pos-price { font-size: 26px; font-weight: 800; color: #fff; }
  .pos-change { font-size: 15px; font-weight: 700; margin-top: 3px; }
  .pos-change.up { color: #4ade80; }
  .pos-change.down { color: #f87171; }

  .pos-metrics {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }
  .metric-box {
    background: #0a0a0f;
    border-radius: 10px;
    padding: 10px 12px;
    border: 1px solid #1e2028;
  }
  .metric-label { font-size: 12px; color: #6b7280; margin-bottom: 4px; }
  .metric-val { font-size: 16px; font-weight: 700; color: #e8ecf0; }
  .metric-val.pos { color: #4ade80; }
  .metric-val.neg { color: #f87171; }

  .pos-levels { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .level-box {
    border-radius: 10px;
    padding: 10px 14px;
    border: 1px solid;
  }
  .level-box.target { background: #1e3a5f22; border-color: #3b82f644; }
  .level-box.stop   { background: #7f1d1d22; border-color: #ef444444; }
  .level-label { font-size: 12px; margin-bottom: 4px; font-weight: 600; }
  .level-box.target .level-label { color: #60a5fa; }
  .level-box.stop   .level-label { color: #f87171; }
  .level-price { font-size: 18px; font-weight: 800; }
  .level-box.target .level-price { color: #93c5fd; }
  .level-box.stop   .level-price { color: #fca5a5; }
  .level-dist { font-size: 12px; margin-top: 3px; }
  .level-box.target .level-dist { color: #60a5fa99; }
  .level-box.stop   .level-dist { color: #f8717199; }

  .pos-note {
    font-size: 13px;
    font-weight: 600;
    background: #fbbf2415;
    border: 1px solid #fbbf2430;
    border-radius: 8px;
    padding: 8px 12px;
    color: #fbbf24;
    line-height: 1.5;
  }

  /* 評価サマリー */
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .summary-box {
    background: #111118;
    border: 1px solid #1e2028;
    border-radius: 12px;
    padding: 16px 18px;
  }
  .summary-label { font-size: 12px; color: #6b7280; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .summary-val { font-size: 22px; font-weight: 800; }
  .summary-val.pos { color: #4ade80; }
  .summary-val.neg { color: #f87171; }
  .summary-sub { font-size: 13px; color: #6b7280; margin-top: 4px; }

  /* 確定トレード */
  .closed-card {
    background: #111118;
    border: 1px solid #1e2028;
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .closed-name { font-size: 16px; font-weight: 700; color: #e8ecf0; margin-bottom: 4px; }
  .closed-meta { font-size: 13px; color: #6b7280; }
  .closed-pnl { font-size: 22px; font-weight: 800; text-align: right; }
  .closed-pnl.pos { color: #4ade80; }
  .closed-pnl.neg { color: #f87171; }
  .closed-date { font-size: 12px; color: #6b7280; text-align: right; margin-top: 4px; }

  /* フッター */
  .footer {
    font-size: 12px;
    color: #374151;
    text-align: center;
    padding: 20px 0 0;
    line-height: 1.8;
  }

  /* ローディング */
  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; gap: 16px; }
  .loading-text { font-size: 14px; color: #6b7280; }
  .spinner { width: 32px; height: 32px; border: 3px solid #1e2028; border-top-color: #4ade80; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error { text-align: center; padding: 60px 20px; color: #6b7280; font-size: 15px; }

  /* サイドバー */
  .layout { display: flex; min-height: 100vh; }
  .sidebar {
    width: 220px; flex-shrink: 0;
    background: #0d1018;
    border-right: 1px solid #1c2535;
    display: flex; flex-direction: column;
    position: fixed; top: 0; left: 0; bottom: 0;
    z-index: 100;
  }
  .sidebar-brand {
    padding: 22px 20px 18px;
    font-size: 20px; font-weight: 800; color: #fff;
    border-bottom: 1px solid #1c2535;
    letter-spacing: -0.5px;
  }
  .sidebar-brand span { color: #4a9e7a; }
  .sidebar-nav { padding: 14px 10px; flex: 1; display: flex; flex-direction: column; gap: 3px; }
  .nav-item {
    display: flex; align-items: center; gap: 11px;
    padding: 10px 12px; border-radius: 9px;
    color: #8a9ab8; text-decoration: none;
    font-size: 14px; font-weight: 600;
    transition: all .15s;
  }
  .nav-item:hover { background: #161d2a; color: #dce4f0; }
  .nav-item.active { background: #161d2a; color: #4a9e7a; }
  .nav-icon { font-size: 17px; width: 22px; text-align: center; }
  .sidebar-footer {
    padding: 14px 20px;
    font-size: 11px; color: #4e5f78;
    border-top: 1px solid #1c2535;
  }
  .main-wrap { flex: 1; margin-left: 220px; min-width: 0; }

  /* モバイル対応 */
  .mobile-nav { display: none; }
  @media (max-width: 767px) {
    .sidebar { display: none; }
    .main-wrap { margin-left: 0; }
    .header { padding: 12px 16px; }
    .header-title { font-size: 18px; }
    .container { padding: 16px 16px 80px; }
    .monthly-breakdown { grid-template-columns: 1fr 1fr; }
    .pos-metrics { grid-template-columns: 1fr 1fr; }
    .pos-name { font-size: 16px; }
    .pos-price { font-size: 22px; }
    .monthly-pnl { font-size: 28px; }
    .mobile-nav {
      display: flex; position: fixed; bottom: 0; left: 0; right: 0;
      height: 60px; background: #0d1018; border-top: 1px solid #1c2535; z-index: 200;
    }
    .mobile-nav a {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2px; text-decoration: none;
      color: #4e5f78; font-size: 10px; font-weight: 600;
    }
    .mobile-nav a.active { color: #4a9e7a; }
    .mobile-nav .mnav-icon { font-size: 20px; line-height: 1; }
  }
</style>
</head>
<body>
<div class="layout">

<div class="sidebar">
  <div class="sidebar-brand">⚡ <span>Warren</span></div>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="nav-item active">
      <span class="nav-icon">📊</span>ポジション
    </a>
    <a href="watchlist.html" class="nav-item">
      <span class="nav-icon">🎯</span>次の一手
    </a>
    <a href="ranking.html" class="nav-item">
      <span class="nav-icon">📈</span>全銘柄ランキング
    </a>
    <a href="portfolio.html" class="nav-item">
      <span class="nav-icon">💼</span>推奨ポートフォリオ
    </a>
  </nav>
  <div class="sidebar-footer">Powered by Claude</div>
</div>

<div class="main-wrap">
<div class="header">
  <div class="header-title">📊 ポジション</div>
  <div class="header-meta" id="lastUpdated">読み込み中...</div>
</div>

<div class="container">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">データを取得中...</div>
  </div>
  <div id="content" style="display:none"></div>
</div>
</div><!-- /main-wrap -->
</div><!-- /layout -->

<script>
const fmt = n => Math.abs(n).toLocaleString('ja-JP');
const fmtSigned = n => (n >= 0 ? '+¥' : '−¥') + fmt(n);
const fmtPct = p => (p >= 0 ? '+' : '') + p.toFixed(2) + '%';
const fmtMan = n => (Math.abs(n) / 10000).toFixed(1) + '万';

function buildMonthly(data) {
  const positions = data.positions || [];
  const closed = data.closed_trades || [];
  const target = data.monthly_target || 1500000;
  const unrealized = positions.reduce((s, p) => s + (p.pnl_total || 0), 0);
  const realized   = closed.reduce((s, c) => s + (c.pnl || 0), 0);
  const total = unrealized + realized;
  const pct = Math.min(Math.max(total / target * 100, 0), 100);
  const isPos = total >= 0;
  const achievePct = (total / target * 100).toFixed(1);

  return `
<div class="monthly-card">
  <div class="monthly-top">
    <div>
      <div class="monthly-label">${data.month || ''} 月次損益</div>
      <div class="monthly-pnl ${isPos ? 'pos' : 'neg'}">${fmtSigned(total)}</div>
    </div>
    <div class="monthly-target-info">
      <div class="monthly-target-label">月次目標</div>
      <div class="monthly-target-val">¥${fmtMan(target)}</div>
      <div class="monthly-pct-badge ${isPos ? '' : 'neg'}">${achievePct}%</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-labels">
      <span>進捗</span>
      <span>${isPos ? pct.toFixed(1) + '%' : '0%'}</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill ${isPos ? 'pos' : 'neg'}" style="width:${pct}%"></div>
    </div>
  </div>

  <div class="monthly-breakdown">
    <div class="breakdown-item">
      <div class="breakdown-label">含み損益</div>
      <div class="breakdown-val ${unrealized >= 0 ? 'pos' : 'neg'}">${fmtSigned(unrealized)}</div>
    </div>
    <div class="breakdown-item">
      <div class="breakdown-label">確定損益</div>
      <div class="breakdown-val ${realized >= 0 ? 'pos' : 'neg'}">${fmtSigned(realized)}</div>
    </div>
    <div class="breakdown-item">
      <div class="breakdown-label">保有銘柄</div>
      <div class="breakdown-val neutral">${positions.length}銘柄</div>
    </div>
  </div>
</div>`;
}

function buildPositions(positions) {
  if (!positions || positions.length === 0) return '<p class="error">アクティブポジションなし</p>';
  return positions.map(p => {
    const isProfit = p.pnl_total >= 0;
    const isAlert  = p.note && (p.note.startsWith('🎯') || p.note.startsWith('🚀'));
    const accentClass = isAlert ? 'alert' : (isProfit ? 'profit' : 'loss');
    const targetDist = p.target_price ? ((p.target_price - p.current_price) / p.current_price * 100).toFixed(1) : null;
    const stopDist   = p.stop_price   ? ((p.stop_price   - p.current_price) / p.current_price * 100).toFixed(1) : null;
    const noteHtml = p.note ? `<div class="pos-note">${p.note}</div>` : '';
    return `
<div class="pos-card">
  <div class="pos-card-accent ${accentClass}"></div>
  <div class="pos-inner">
    <div class="pos-header">
      <div>
        <div class="pos-name">${p.name}</div>
        <div class="pos-sub">${p.code} ・ ${p.shares.toLocaleString()}株 ・ 取得¥${p.entry_price.toLocaleString()}</div>
      </div>
      <div class="pos-price-block">
        <div class="pos-price">¥${p.current_price.toLocaleString()}</div>
        <div class="pos-change ${isProfit ? 'up' : 'down'}">${fmtSigned(p.pnl_per)} (${fmtPct(p.pnl_pct)})</div>
      </div>
    </div>

    <div class="pos-metrics">
      <div class="metric-box">
        <div class="metric-label">評価額</div>
        <div class="metric-val">¥${fmtMan(p.current_value)}</div>
      </div>
      <div class="metric-box">
        <div class="metric-label">含み損益</div>
        <div class="metric-val ${isProfit ? 'pos' : 'neg'}">${fmtSigned(p.pnl_total)}</div>
      </div>
      <div class="metric-box">
        <div class="metric-label">損益率</div>
        <div class="metric-val ${isProfit ? 'pos' : 'neg'}">${fmtPct(p.pnl_pct)}</div>
      </div>
    </div>

    <div class="pos-levels">
      <div class="level-box target">
        <div class="level-label">↑ 目標 +${p.target_pct}%</div>
        <div class="level-price">¥${p.target_price.toLocaleString()}</div>
        ${targetDist !== null ? `<div class="level-dist">現在値からあと ${targetDist > 0 ? '+' : ''}${targetDist}%</div>` : ''}
      </div>
      <div class="level-box stop">
        <div class="level-label">↓ 損切 ${p.stop_pct}%</div>
        <div class="level-price">¥${p.stop_price.toLocaleString()}</div>
        ${stopDist !== null ? `<div class="level-dist">現在値から ${stopDist}%</div>` : ''}
      </div>
    </div>
    ${noteHtml}
  </div>
</div>`;
  }).join('');
}

function buildSummary(positions) {
  const totalValue = positions.reduce((s, p) => s + (p.current_value || 0), 0);
  const totalCost  = positions.reduce((s, p) => s + (p.entry_price * p.shares || 0), 0);
  const totalPnl   = positions.reduce((s, p) => s + (p.pnl_total || 0), 0);
  const pct = totalCost > 0 ? totalPnl / totalCost * 100 : 0;
  return `
<div class="summary-grid">
  <div class="summary-box">
    <div class="summary-label">評価額合計</div>
    <div class="summary-val">¥${fmtMan(totalValue)}</div>
    <div class="summary-sub">取得額 ¥${fmtMan(totalCost)}</div>
  </div>
  <div class="summary-box">
    <div class="summary-label">含み損益合計</div>
    <div class="summary-val ${totalPnl >= 0 ? 'pos' : 'neg'}">${fmtSigned(totalPnl)}</div>
    <div class="summary-sub">${fmtPct(pct)}</div>
  </div>
</div>`;
}

function buildClosed(closed) {
  if (!closed || closed.length === 0) return '<p style="color:#6b7280;font-size:14px;text-align:center;padding:12px">なし</p>';
  return closed.map(c => {
    const isPos = c.pnl >= 0;
    return `
<div class="closed-card">
  <div>
    <div class="closed-name">${c.name}</div>
    <div class="closed-meta">${c.code} ・ ${c.shares.toLocaleString()}株 ・ ${c.note || ''}</div>
  </div>
  <div>
    <div class="closed-pnl ${isPos ? 'pos' : 'neg'}">${fmtSigned(c.pnl)}</div>
    <div class="closed-date">${c.close_date || ''}</div>
  </div>
</div>`;
  }).join('');
}

function render(data) {
  document.getElementById('lastUpdated').textContent = data.last_updated ? `更新: ${data.last_updated}` : '—';
  const positions = data.positions || [];
  const closed    = data.closed_trades || [];

  document.getElementById('content').innerHTML = `
${buildMonthly(data)}

<div class="section-title">アクティブポジション (${positions.length}件)</div>
${buildPositions(positions)}

<div class="section-title">評価サマリー ※参考値</div>
${buildSummary(positions)}

<div class="section-title">確定済みトレード (${data.month || ''})</div>
${buildClosed(closed)}

<div class="footer">
  ※ 株価はyfinance取得値（最大15分遅延）。SBI証券のリアルタイム価格とは差が出る場合があります。<br>
  ⚡ Warren — Powered by Claude
</div>`;

  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
}

async function load() {
  try {
    const res = await fetch('positions.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    render(await res.json());
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').innerHTML = `<p class="error">読み込みエラー: ${e.message}</p>`;
    document.getElementById('content').style.display = 'block';
  }
}

load();
setInterval(load, 5 * 60 * 1000);
</script>
<nav class="mobile-nav">
  <a href="dashboard.html" class="active"><span class="mnav-icon">📊</span>ポジション</a>
  <a href="watchlist.html"><span class="mnav-icon">🎯</span>次の一手</a>
  <a href="ranking.html"><span class="mnav-icon">📈</span>ランキング</a>
  <a href="portfolio.html"><span class="mnav-icon">💼</span>ポートフォリオ</a>
</nav>
</body>
</html>
