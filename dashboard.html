<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warren Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }

  .header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 18px; font-weight: 700; color: #f0f6fc; letter-spacing: 0.5px; }
  .header h1 span { color: #3fb950; }
  .last-updated { font-size: 11px; color: #8b949e; }

  .container { max-width: 680px; margin: 0 auto; padding: 16px; }

  /* 月次進捗 */
  .monthly-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
  .monthly-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .monthly-title { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
  .monthly-amount { font-size: 24px; font-weight: 700; color: #3fb950; }
  .monthly-amount.negative { color: #f85149; }
  .monthly-target-row { display: flex; justify-content: space-between; font-size: 11px; color: #8b949e; margin-bottom: 8px; }
  .progress-bar { height: 6px; background: #21262d; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .progress-fill.positive { background: linear-gradient(90deg, #238636, #3fb950); }
  .progress-fill.negative { background: #b62324; }
  .monthly-breakdown { display: flex; gap: 12px; margin-top: 10px; font-size: 11px; }
  .breakdown-item { color: #8b949e; }
  .breakdown-item span { color: #e6edf3; font-weight: 600; }
  .breakdown-item span.pos { color: #3fb950; }
  .breakdown-item span.neg { color: #f85149; }

  /* セクションヘッダー */
  .section-label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.8px; margin: 20px 0 10px; padding-left: 2px; }

  /* ポジションカード */
  .position-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; position: relative; overflow: hidden; }
  .position-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .position-card.profit::before { background: #3fb950; }
  .position-card.loss::before { background: #f85149; }
  .position-card.alert::before { background: #d29922; animation: pulse 1.5s ease-in-out infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .pos-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .pos-name { font-size: 14px; font-weight: 700; color: #f0f6fc; }
  .pos-code { font-size: 11px; color: #8b949e; margin-top: 2px; }
  .pos-price-block { text-align: right; }
  .pos-price { font-size: 20px; font-weight: 700; color: #f0f6fc; }
  .pos-change { font-size: 12px; font-weight: 600; margin-top: 2px; }
  .pos-change.up { color: #3fb950; }
  .pos-change.down { color: #f85149; }

  .pos-metrics { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .metric { background: #0d1117; border-radius: 6px; padding: 7px 10px; }
  .metric-label { font-size: 10px; color: #8b949e; margin-bottom: 3px; }
  .metric-value { font-size: 13px; font-weight: 600; color: #e6edf3; }
  .metric-value.pos { color: #3fb950; }
  .metric-value.neg { color: #f85149; }

  .pos-levels { display: flex; gap: 8px; margin-bottom: 8px; }
  .level-chip { flex: 1; border-radius: 6px; padding: 6px 10px; font-size: 11px; text-align: center; }
  .level-chip.target { background: #0d419d22; border: 1px solid #1f6feb; color: #58a6ff; }
  .level-chip.stop { background: #b6212144; border: 1px solid #f85149; color: #f85149; }
  .level-chip .chip-label { font-size: 10px; opacity: 0.8; margin-bottom: 2px; }
  .level-chip .chip-value { font-weight: 700; }
  .level-chip .chip-dist { font-size: 10px; opacity: 0.7; }

  .pos-note { font-size: 11px; color: #d29922; background: #d2992215; border: 1px solid #d2992230; border-radius: 5px; padding: 5px 9px; }

  /* 損益サマリー（合計） */
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .summary-item { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px 14px; }
  .summary-item-label { font-size: 10px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .summary-item-value { font-size: 18px; font-weight: 700; }
  .summary-item-value.pos { color: #3fb950; }
  .summary-item-value.neg { color: #f85149; }
  .summary-item-sub { font-size: 10px; color: #8b949e; margin-top: 2px; }

  /* クローズドトレード */
  .closed-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; margin-bottom: 8px; }
  .closed-info { }
  .closed-name { font-size: 13px; font-weight: 600; color: #e6edf3; }
  .closed-meta { font-size: 11px; color: #8b949e; margin-top: 2px; }
  .closed-pnl { text-align: right; }
  .closed-pnl-val { font-size: 15px; font-weight: 700; }
  .closed-pnl-val.pos { color: #3fb950; }
  .closed-pnl-val.neg { color: #f85149; }
  .closed-date { font-size: 10px; color: #8b949e; margin-top: 2px; }

  /* 注意書き */
  .disclaimer { font-size: 10px; color: #6e7681; text-align: center; padding: 12px 0 24px; line-height: 1.6; }

  /* エラー */
  .error-msg { text-align: center; color: #8b949e; padding: 40px 20px; font-size: 14px; }

  /* ローディング */
  .loading { text-align: center; padding: 60px 20px; }
  .loading-dot { display: inline-block; width: 8px; height: 8px; background: #3fb950; border-radius: 50%; animation: bounce 1.2s ease-in-out infinite; margin: 0 3px; }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }
</style>
</head>
<body>

<div class="header">
  <h1>⚡ <span>Warren</span> Dashboard</h1>
  <div class="last-updated" id="lastUpdated">読み込み中...</div>
</div>

<div class="container">
  <div class="loading" id="loading">
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
  </div>
  <div id="content" style="display:none"></div>
</div>

<script>
function fmt(n) { return Math.abs(n).toLocaleString('ja-JP'); }
function fmtSigned(n) { return (n >= 0 ? '+¥' : '-¥') + fmt(n); }
function fmtPct(p) { return (p >= 0 ? '+' : '') + p.toFixed(2) + '%'; }

function buildMonthly(data) {
  const positions = data.positions || [];
  const closed = data.closed_trades || [];
  const target = data.monthly_target || 1500000;

  const unrealizedTotal = positions.reduce((s, p) => s + (p.pnl_total || 0), 0);
  const realizedTotal = closed.reduce((s, c) => s + (c.pnl || 0), 0);
  const totalPnl = unrealizedTotal + realizedTotal;
  const pct = Math.min(Math.max((totalPnl / target) * 100, 0), 100);
  const isPos = totalPnl >= 0;

  return `
<div class="monthly-card">
  <div class="monthly-header">
    <span class="monthly-title">${data.month || ''} 月次損益</span>
    <span class="monthly-amount ${isPos ? '' : 'negative'}">${fmtSigned(totalPnl)}</span>
  </div>
  <div class="monthly-target-row">
    <span>月次目標: ¥${(target/10000).toFixed(0)}万円</span>
    <span>${isPos ? pct.toFixed(1) + '%' : '—'}</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill ${isPos ? 'positive' : 'negative'}" style="width:${pct}%"></div>
  </div>
  <div class="monthly-breakdown">
    <div class="breakdown-item">含み損益 <span class="${unrealizedTotal >= 0 ? 'pos' : 'neg'}">${fmtSigned(unrealizedTotal)}</span></div>
    <div class="breakdown-item">確定損益 <span class="${realizedTotal >= 0 ? 'pos' : 'neg'}">${fmtSigned(realizedTotal)}</span></div>
    <div class="breakdown-item">銘柄数 <span>${positions.length}件</span></div>
  </div>
</div>`;
}

function buildPositions(positions) {
  if (!positions || positions.length === 0) return '<p class="error-msg">アクティブポジションなし</p>';

  return positions.map(p => {
    const isProfit = p.pnl_total >= 0;
    const isAlert = p.note && p.note.startsWith('🎯');
    const cardClass = isAlert ? 'alert' : (isProfit ? 'profit' : 'loss');

    const targetDist = p.target_price ? ((p.target_price - p.current_price) / p.current_price * 100).toFixed(1) : null;
    const stopDist = p.stop_price ? ((p.stop_price - p.current_price) / p.current_price * 100).toFixed(1) : null;

    const noteHtml = p.note ? `<div class="pos-note">${p.note}</div>` : '';

    return `
<div class="position-card ${cardClass}">
  <div class="pos-top">
    <div>
      <div class="pos-name">${p.name}</div>
      <div class="pos-code">${p.code} ・ ${p.shares.toLocaleString()}株</div>
    </div>
    <div class="pos-price-block">
      <div class="pos-price">¥${p.current_price.toLocaleString()}</div>
      <div class="pos-change ${isProfit ? 'up' : 'down'}">${fmtSigned(p.pnl_per)} (${fmtPct(p.pnl_pct)})</div>
    </div>
  </div>

  <div class="pos-metrics">
    <div class="metric">
      <div class="metric-label">取得単価</div>
      <div class="metric-value">¥${p.entry_price.toLocaleString()}</div>
    </div>
    <div class="metric">
      <div class="metric-label">評価額</div>
      <div class="metric-value">¥${(p.current_value / 10000).toFixed(1)}万</div>
    </div>
    <div class="metric">
      <div class="metric-label">含み損益</div>
      <div class="metric-value ${isProfit ? 'pos' : 'neg'}">${fmtSigned(p.pnl_total)}</div>
    </div>
  </div>

  <div class="pos-levels">
    <div class="level-chip target">
      <div class="chip-label">↑ 目標 +${p.target_pct}%</div>
      <div class="chip-value">¥${p.target_price.toLocaleString()}</div>
      ${targetDist !== null ? `<div class="chip-dist">あと ${targetDist > 0 ? '+' : ''}${targetDist}%</div>` : ''}
    </div>
    <div class="level-chip stop">
      <div class="chip-label">↓ 損切 ${p.stop_pct}%</div>
      <div class="chip-value">¥${p.stop_price.toLocaleString()}</div>
      ${stopDist !== null ? `<div class="chip-dist">まで ${stopDist}%</div>` : ''}
    </div>
  </div>
  ${noteHtml}
</div>`;
  }).join('');
}

function buildSummary(positions) {
  const totalValue = positions.reduce((s, p) => s + (p.current_value || 0), 0);
  const totalCost = positions.reduce((s, p) => s + (p.entry_price * p.shares || 0), 0);
  const totalPnl = positions.reduce((s, p) => s + (p.pnl_total || 0), 0);
  const totalPct = totalCost > 0 ? (totalPnl / totalCost * 100) : 0;

  return `
<div class="summary-grid">
  <div class="summary-item">
    <div class="summary-item-label">評価額合計</div>
    <div class="summary-item-value">¥${(totalValue / 10000).toFixed(1)}万</div>
    <div class="summary-item-sub">取得 ¥${(totalCost / 10000).toFixed(1)}万</div>
  </div>
  <div class="summary-item">
    <div class="summary-item-label">含み損益合計</div>
    <div class="summary-item-value ${totalPnl >= 0 ? 'pos' : 'neg'}">${fmtSigned(totalPnl)}</div>
    <div class="summary-item-sub">${fmtPct(totalPct)}</div>
  </div>
</div>`;
}

function buildClosed(closed) {
  if (!closed || closed.length === 0) return '<p style="color:#8b949e;font-size:12px;text-align:center;padding:12px">なし</p>';

  return closed.map(c => {
    const isProfit = c.pnl >= 0;
    return `
<div class="closed-row">
  <div class="closed-info">
    <div class="closed-name">${c.name}</div>
    <div class="closed-meta">${c.code} ・ ${c.shares.toLocaleString()}株 ・ ${c.note || ''}</div>
  </div>
  <div class="closed-pnl">
    <div class="closed-pnl-val ${isProfit ? 'pos' : 'neg'}">${fmtSigned(c.pnl)}</div>
    <div class="closed-date">${c.close_date || ''}</div>
  </div>
</div>`;
  }).join('');
}

function render(data) {
  const positions = data.positions || [];
  const closed = data.closed_trades || [];

  document.getElementById('lastUpdated').textContent = data.last_updated ? `更新: ${data.last_updated}` : '';

  const html = `
${buildMonthly(data)}

<div class="section-label">アクティブポジション (${positions.length}件)</div>
${buildPositions(positions)}

<div class="section-label">評価サマリー</div>
${buildSummary(positions)}

<div class="section-label">確定済みトレード (${data.month || ''})</div>
${buildClosed(closed)}

<div class="disclaimer">
  ※ 評価額・株価はyfinance取得値（最大15分遅延）。SBI証券のリアルタイム価格とは差が出る場合があります。<br>
  ⚡ Warren — Powered by Claude
</div>`;

  document.getElementById('content').innerHTML = html;
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
}

async function loadData() {
  try {
    const res = await fetch('positions.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    render(data);
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').innerHTML = `<p class="error-msg">データ読み込みエラー: ${e.message}</p>`;
    document.getElementById('content').style.display = 'block';
  }
}

loadData();
// 5分ごとに自動リフレッシュ
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
